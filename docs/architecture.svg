<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" width="800" height="560" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <rect width="800" height="560" fill="#0A1628"/>
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#94A3B8"/>
    </marker>
  </defs>

  <text x="400" y="40" text-anchor="middle" fill="#E2E8F0" font-size="22" font-weight="700">TrustFlow System Architecture</text>

  <!-- Top: user -->
  <rect x="300" y="70" width="200" height="54" rx="12" fill="rgba(100,116,139,0.18)" stroke="rgba(100,116,139,0.6)" stroke-width="1"/>
  <text x="400" y="98" text-anchor="middle" fill="#E2E8F0" font-size="15" font-weight="600">Freelancer / Client</text>
  <text x="400" y="115" text-anchor="middle" fill="#94A3B8" font-size="11">Connects QIE Wallet</text>

  <line x1="400" y1="124" x2="400" y2="158" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Middle: contracts -->
  <rect x="70" y="162" width="660" height="150" rx="16" fill="rgba(83,74,183,0.15)" stroke="rgba(83,74,183,0.55)" stroke-width="1"/>
  <text x="92" y="188" fill="#E2E8F0" font-size="15" font-weight="700">TrustFlow Smart Contracts</text>
  <text x="92" y="206" fill="#94A3B8" font-size="11">Solidity 0.8.20 · QIE Testnet</text>

  <g>
    <rect x="96" y="222" width="190" height="74" rx="10" fill="rgba(29,158,117,0.2)" stroke="rgba(29,158,117,0.55)" stroke-width="1"/>
    <text x="191" y="255" text-anchor="middle" fill="#E2E8F0" font-size="14" font-weight="600">Agreement engine</text>
    <text x="191" y="274" text-anchor="middle" fill="#94A3B8" font-size="11">Milestones · escrow</text>
  </g>
  <g>
    <rect x="305" y="222" width="190" height="74" rx="10" fill="rgba(29,158,117,0.2)" stroke="rgba(29,158,117,0.55)" stroke-width="1"/>
    <text x="400" y="255" text-anchor="middle" fill="#E2E8F0" font-size="14" font-weight="600">Trust score engine</text>
    <text x="400" y="274" text-anchor="middle" fill="#94A3B8" font-size="11">Tiers · reputation</text>
  </g>
  <g>
    <rect x="514" y="222" width="190" height="74" rx="10" fill="rgba(29,158,117,0.2)" stroke="rgba(29,158,117,0.55)" stroke-width="1"/>
    <text x="609" y="255" text-anchor="middle" fill="#E2E8F0" font-size="14" font-weight="600">Payment processor</text>
    <text x="609" y="274" text-anchor="middle" fill="#94A3B8" font-size="11">SafeERC20 · fees</text>
  </g>

  <line x1="191" y1="312" x2="191" y2="360" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="400" y1="312" x2="400" y2="360" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="609" y1="312" x2="609" y2="360" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Bottom: QIE ecosystem -->
  <rect x="40" y="364" width="720" height="170" rx="16" fill="rgba(216,90,48,0.12)" stroke="rgba(216,90,48,0.5)" stroke-width="1"/>
  <text x="62" y="390" fill="#E2E8F0" font-size="15" font-weight="700">QIE Blockchain Ecosystem</text>

  <g font-size="13" font-weight="600">
    <rect x="60" y="406" width="128" height="108" rx="10" fill="rgba(245,158,11,0.18)" stroke="rgba(245,158,11,0.55)" stroke-width="1"/>
    <text x="124" y="456" text-anchor="middle" fill="#E2E8F0">QIE Wallet</text>
    <text x="124" y="476" text-anchor="middle" fill="#94A3B8" font-size="11" font-weight="400">Auth + signing</text>

    <rect x="198" y="406" width="128" height="108" rx="10" fill="rgba(245,158,11,0.18)" stroke="rgba(245,158,11,0.55)" stroke-width="1"/>
    <text x="262" y="456" text-anchor="middle" fill="#E2E8F0">QUSDC</text>
    <text x="262" y="476" text-anchor="middle" fill="#94A3B8" font-size="11" font-weight="400">Stablecoin rail</text>

    <rect x="336" y="406" width="128" height="108" rx="10" fill="rgba(245,158,11,0.18)" stroke="rgba(245,158,11,0.55)" stroke-width="1"/>
    <text x="400" y="456" text-anchor="middle" fill="#E2E8F0">QIE Pass</text>
    <text x="400" y="476" text-anchor="middle" fill="#94A3B8" font-size="11" font-weight="400">Identity +200</text>

    <rect x="474" y="406" width="128" height="108" rx="10" fill="rgba(245,158,11,0.18)" stroke="rgba(245,158,11,0.55)" stroke-width="1"/>
    <text x="538" y="456" text-anchor="middle" fill="#E2E8F0">QIE Domains</text>
    <text x="538" y="476" text-anchor="middle" fill="#94A3B8" font-size="11" font-weight="400">name.qie</text>

    <rect x="612" y="406" width="128" height="108" rx="10" fill="rgba(245,158,11,0.18)" stroke="rgba(245,158,11,0.55)" stroke-width="1"/>
    <text x="676" y="456" text-anchor="middle" fill="#E2E8F0">QIEDEX</text>
    <text x="676" y="476" text-anchor="middle" fill="#94A3B8" font-size="11" font-weight="400">Token swap</text>
  </g>
</svg>
